name: Quality Checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, test]
        include:
          - check: format
            name: "Format Check"
            command: "pdm run ruff format --check ."
          - check: lint
            name: "Lint Check"
            command: "pdm run ruff check ."
          - check: test
            name: "Tests Check"
            command: "pdm run tests"

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          cache: true

      - name: Install dependencies
        run: pdm install -d

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  check-license-header:
    name: License Header Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Licensor
        run: |
          curl -L https://github.com/nicebots-xyz/licensor/releases/download/v0.0.2/licensor-v0.0.2-linux-x86_64.tar.gz -o licensor.tar.gz
          tar -xzf licensor.tar.gz
          sudo mv licensor licensor.jar /usr/local/bin/
          sudo chmod +x /usr/local/bin/licensor
        shell: bash
      - name: Check Header Compliance
        run: licensor check * --ignore ".*"
