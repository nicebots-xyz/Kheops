info_reusable_strings: &info_reusable_strings
  main_text:
    en-US: |
      # Informations

      Le serveur Discord Les Frères Poulain est un serveur communautaire lié à la chaine YouTube Les Frères Poulain.

      Vous y trouverez des discussions liées au contenu de la chaine, mais aussi des discussions plus générales, des salons de partage de créations, de l'entraide et plus encore.

      Le réglement du serveur est disponible dans le salon <#563836837043372033>. En cas de problème immédiat et/ou d'enfreinte du règlement, veuillez mentionners les modérateurs avec le rôle suivant: <@&564753350999015444>.
      
      Les roles à choix, tels que les rôles de spécialisation, notifications, sexe et majorité  peuvent être sélectionnées dans <id:customize>.
      
      Si vous avez des suggestions pour le serveur, n'héistez-pas à les partager dans <#565592753832984576>.
      
      Lorsque les Frèrs Poulain organisent des évenements en vocal, ils répondront aux questions postées dans <#1452597928064585728>, n'hésitez donc pas à y poser les votres !

  networks_heading:
    en-US: "## Réseaux"
  networks_text:
    en-US: "Retrouvez Les Frères Poulain sur leurs réseaux sociaux:** https://liens.lfp.yt/ **"
  tipeee_text:
    en-US: |
      ## Tipeee
      Si vous êtes donateurs sur Tipeee, vous pouvez obtenir un rôle de supporter dans le serveur Discord, ainsi que l'accès à des salons privés.
      Vous pouvez apprendre comment relier votre compte Discord à Tipeee ici: https://help.tipeee.com/hc/fr/articles/4409363743378-J-ai-pris-une-contrepartie-offrant-un-rôle-Discord-comment-en-bénéficier
      
      En cas de difficulté, n'hésitez pas à contacter un membre du staff du serveur.
  leveled_roles_text:
    en-US: |
      ## Rôles de niveau

      Plus vous participez dans le serveur, en discutant dans <#563776770210398212> par exemple, plus vous montez en niveau et obtenez des rôles de niveaux suivants:
      - <@&696709538933506138> (100)
      - <@&835084813060407306> (1500)
      - <@&835087730379718686> (4500)
      - <@&573183139623600128> (7000)
      - <@&835083962384252928> (10000)
      - <@&573183264706134063> (15000)
      - <@&835084802285371402> (25000)
      - <@&835083821598244884> (35000)
      - <@&829424025301286993> (45000)
      - <@&829425274655211540> (125000)

      Vous pouvez afficher votre niveau dans <#573182754410201088> en utilisant la commande </rank:957876936024150016>.
  activity_roles_voice:
    en-US: |
      ## Rôles d'activité vocale

      Chaque semaine, les personnes les plus actives dans les salons vocaux sont récompensées avec des rôles spécifiques. Ces rôles sont attribués en fonction de la durée des communications vocales comme suit:
      - <@&829694597650972672> (5h30)
      - <@&829695043890577458> (15h)
      - <@&829695227165540432> (25h)
      - <@&829695582233821184> (35h)
      - <@&829696005833621534> (60h)

      Vous pouvez afficher vos statistiques dans <#573182754410201088> en utilisant la commande </stats user:1025501230044286982>.
  recruiting_text:
    en-US: |
      ## Recrutement

      Le serveur **Les Frères Poulain** recrute :
      - **Modérateurs** Discord ({mods} postes)
      - **Animateurs** Discord ({anim} postes)
      - **Happy Managers** Discord ({happymanager} postes)

      - Recrutement uniquement Discord
      - Possibilité de modération Twitch sous conditions à établir

      **Processus:**
      - Candidature via le Google Form obligatoire
      - Entretien vocal sur Discord pour les profils retenus

      **https://docs.google.com/forms/d/e/1FAIpQLSejt4YxH7QLWtSLohzS7m4MPCb814vHwBCDC5712dxDB2BWpQ/viewform**
  self_text:
    en-US: |
      ## Bot Discord

      Ce Bot Discord ({bot.user.mention}) est développé en open-source en partenariat avec [NiceBots.xyz](https://nicebots.xyz), et son code source est disponible sur [GitHub](https://github.com/nicebots-xyz/Kheops).
      
      Les contributions sont bienvenues, sous conditons du réspect:
      - du [Code de Conduite](https://github.com/nicebots-xyz/Kheops?tab=coc-ov-file)
      - des [Règles de Contribution](https://github.com/nicebots-xyz/Kheops?tab=contributing-ov-file)
      - du <#563836837043372033> du serveur Discord
      
      Si vous souhaitez contribuer une fonctionnalité complexe, n'hésitez pas à en discuter d'abord avec un membre de la team <@&1442261800908492963>.

